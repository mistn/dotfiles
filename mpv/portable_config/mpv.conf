# === UI与核心渲染设置（针对核显优化，解决卡顿） ===
osc=no
vo=gpu
gpu-api=d3d11
# 使用 Windows 专属硬解 API，极大提升 uosc 界面和视频的流畅度
hwdec=d3d11va

# === 窗口与极简外观 ===
border=no
autofit-larger=80%x80%
keep-open=yes
save-position-on-quit=yes

# === 性能优化（针对 1080p 屏幕） ===
# 注释掉色彩空间转换（普通 1080p 屏幕不需要，关掉能大幅节省显卡性能）
# target-colorspace-hint=yes 
# 强制指定轻量级的缩放算法，降低 CPU/GPU 压力
scale=bilinear
cscale=bilinear
dscale=bilinear

# === 语言与字幕偏好 ===
alang=jpn,jp,eng,en
slang=chi,zh,zh-CN,zh-TW,eng,en,jpn,jp

# === 字幕纯净样式 ===
sub-font="Microsoft YaHei"
sub-font-size=45
sub-color="#FFFFFFFF"
sub-border-size=0
sub-shadow-color="#000000"
sub-shadow-offset=2